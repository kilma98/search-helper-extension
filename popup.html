<!DOCTYPE html>
<html>
<head>
  <title>Search Helper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <h2>🔍 Search Helper</h2>

  <script type="module" src="popup.js"></script>
</body>
</html>
